name = "naftiko-google-sandbox"
main = "src/index.ts"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "GoogleSandboxContainer"
image = "./Dockerfile"
instance_type = "standard-1"
max_instances = 1

[[durable_objects.bindings]]
name = "GOOGLE_SANDBOX"
class_name = "GoogleSandboxContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GoogleSandboxContainer"]
